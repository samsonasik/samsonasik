<svg width="100%" viewBox="0 0 740 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sponsor samsonasik on GitHub</title>
  <desc id="desc">If my work helps you, consider sponsoring me with the price of a coffee.</desc>

  <style>
    .card-bg     { fill: #0d1117; }
    .card-stroke { stroke: #21262d; }
    .icon-bg     { fill: #221610; }
    .title-text  { fill: #f0f6fc; }
    .sub-text    { fill: #8b949e; }
    .btn-bg      { fill: #f59e0b; }
    .btn-fg      { fill: #3d2406; }
    .btn-stroke  { stroke: #3d2406; }

    @media (prefers-color-scheme: light) {
    .card-bg     { fill: #ffffff; }
    .card-stroke { stroke: #d0d7de; }
    .icon-bg     { fill: #fff4e0; }
    .title-text  { fill: #1f2328; }
    .sub-text    { fill: #57606a; }
    .btn-bg      { fill: #e08a00; }
    .btn-fg      { fill: #2a1804; }
    .btn-stroke  { stroke: #2a1804; }
    }
  </style>

  <rect class="card-bg" width="740" height="160" rx="12"/>
  <rect class="card-stroke" x="0.5" y="0.5" width="739" height="159" rx="11.5" fill="none"/>

  <g transform="translate(28, 50)">
    <rect class="icon-bg" width="60" height="60" rx="14"/>
    <rect x="0.5" y="0.5" width="59" height="59" rx="13.5" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.5"/>

    <path d="M 20 18 C 23 14 17 12 20 8" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0; 0.7; 0" dur="2.4s" begin="0s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 4; 0 -2; 0 -8" dur="2.4s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M 26 18 C 23 14 29 12 26 8" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0; 0.7; 0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 4; 0 -2; 0 -8" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M 32 18 C 35 14 29 12 32 8" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" values="0; 0.7; 0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0 4; 0 -2; 0 -8" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </path>

    <path d="M 15 22 L 37 22 L 37 42 Q 37 46 33 46 L 19 46 Q 15 46 15 42 Z" fill="#f59e0b"/>
    <path d="M 37 28 C 46 28 46 40 37 40" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  </g>

  <text class="title-text" x="108" y="70" font-size="22" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif">Has my work helped you?</text>
  <rect x="108" y="80" width="38" height="2" rx="1" fill="#f59e0b"/>

  <text class="sub-text" x="108" y="107" font-size="15" font-weight="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif">Help keep the fixes, refactors and upgrades coming.</text>

  <a href="https://github.com/sponsors/samsonasik" target="_blank">
    <g transform="translate(535, 56)">
      <rect class="btn-bg" width="180" height="48" rx="10"/>

      <path d="M 19 14 C 21 12 17 10 19 6" fill="none" class="btn-stroke" stroke-width="1.3" stroke-linecap="round" opacity="0">
        <animate attributeName="opacity" values="0; 0.6; 0" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 3; 0 -1; 0 -5" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <path d="M 26 14 C 24 12 28 10 26 6" fill="none" class="btn-stroke" stroke-width="1.3" stroke-linecap="round" opacity="0">
        <animate attributeName="opacity" values="0; 0.6; 0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 3; 0 -1; 0 -5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      </path>

      <path d="M 16 16 L 30 16 L 30 29 Q 30 32 27 32 L 19 32 Q 16 32 16 29 Z" class="btn-fg"/>
      <path d="M 30 19 C 35 19 35 26 30 26" fill="none" class="btn-stroke" stroke-width="2" stroke-linecap="round"/>

      <text x="42" y="31" class="btn-fg" font-size="16" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif">Sponsor me →</text>
    </g>
  </a>
</svg>